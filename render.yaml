services:
  - type: web
    name: researchvy-api
    # Docker runtime bypasses the native builder's Prisma binary issue.
    # node:20-slim (Debian) includes the debian-openssl-3.0.x binary that
    # Prisma bundles — no CDN download needed, build is deterministic.
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false
      - key: ORCID_CLIENT_ID
        sync: false
      - key: ORCID_CLIENT_SECRET
        sync: false
      - key: ORCID_REDIRECT_URI
        sync: false
      - key: ORCID_BASE_URL
        value: https://orcid.org
      - key: ORCID_API_URL
        value: https://pub.orcid.org/v3.0
      - key: OPENALEX_EMAIL
        sync: false
